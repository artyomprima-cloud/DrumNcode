services:
  php:
    image: ghcr.io/artyomprima-cloud/php-app:latest
    volumes:
      - ./php/app:/var/www/html
    command: php-fpm
    networks:
      - app-network
  nginx:
    image: ghcr.io/artyomprima-cloud/nginx:latest
    environment:
      PHPFPM_HOST: php 
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./php/app/:/var/www/html
    depends_on:
      - php
    ports:
      - "8080:80"
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
