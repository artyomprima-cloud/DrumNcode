services:
  php:
    image: ghcr.io/artyomprima-cloud/php-app:latest
    expose:
      - "9000"
    volumes:
      - ./php/app:/var/www/html
    networks:
      - app-network
  nginx: 
    image: ghcr.io/artyomprima-cloud/nginx:latest
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - php
    networks:
      - app-network
networks:
  app-network:
    driver: bridge

